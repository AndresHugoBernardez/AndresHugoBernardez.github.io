s)\nNuxy: Cambio de planes, ya tienes refugio humano.\nDofter: Qué quieres decir?\nNuxy: Adquirí un rancho a unos kilómetros, felicitaciones eres el nuevo propietario de una modesta granja. \nDofter: Entiendo, decodificaste su sistema monetario. Pero eso no iría en contra del protocolo?\nNuxy: Si crees que lo he robado, estás equivocado solo puse a trabajar a la computadora, abrí muchas cuentas de contenido pago y luego hice inversiones con lo ganado. Conseguí el dinero legalmente. Además las leyes solo aplican a los humanos. Ahora ve a tu nuevo rancho.\nDofter: No entendí nada de lo que hiciste, solo me importa que no hayamos roto el protocolo. Mándame coordenadas.\n"
